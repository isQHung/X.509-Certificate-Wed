services:
  # Database migration service - runs before backend
  # Set DATABASE_URL env var before running: docker compose up
  # Example: DATABASE_URL='postgresql://user:password@host:5432/postgres' docker compose up
  db-migrate:
    image: postgres:16-alpine
    container_name: db-migrate
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - DATABASE_URL=${DATABASE_URL}  # Pass via -e or .env file
    command: ["sh", "-c", "apk add --no-cache bash util-linux && bash scripts/migration.sh migrate"]
    restart: "no"

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flask-backend
    # env_file:
    #   - ./src/backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./src/backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: nextjs-frontend
    # env_file:
    #   - ./src/frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    restart: unless-stopped