services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flask-backend
    # env_file:
    #   - ./src/backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./src/backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: nextjs-frontend
    # env_file:
    #   - ./src/frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    restart: unless-stopped